<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Military War Game AI System v6.0 - Architecture Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2e3345;
  --border:#333a4d;--text:#e0e0e8;--text2:#a0a4b8;--text3:#6b7089;
  --blue:#3b82f6;--green:#10b981;--orange:#f59e0b;--purple:#a855f7;
  --red:#ef4444;--cyan:#06b6d4;--pink:#ec4899;
  --critical:#dc2626;--high:#ea580c;--medium:#d97706;--low:#2563eb;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px}
.app{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.header h1{font-size:16px;font-weight:600;letter-spacing:.5px}
.header h1 span{color:var(--blue);font-size:12px;margin-left:8px;font-weight:400}
.tabs{display:flex;gap:2px}
.tab{padding:8px 18px;background:var(--bg3);border:1px solid transparent;border-radius:6px 6px 0 0;cursor:pointer;color:var(--text2);font-size:13px;transition:all .2s}
.tab:hover{background:var(--bg4);color:var(--text)}
.tab.active{background:var(--bg);border-color:var(--border);border-bottom-color:var(--bg);color:var(--blue);font-weight:600}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:14px 14px 8px}
.control-group{padding:4px 14px 12px;border-bottom:1px solid var(--border)}
.control-group label{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;font-size:13px;color:var(--text2);transition:color .15s}
.control-group label:hover{color:var(--text)}
.control-group label input[type="checkbox"]{accent-color:var(--blue)}
.color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.preset-btn{display:block;width:100%;padding:7px 12px;margin:3px 0;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:12px;cursor:pointer;text-align:left;transition:all .15s}
.preset-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--blue)}
.preset-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.1)}
.canvas-area{flex:1;position:relative;overflow:hidden;background:var(--bg)}
.canvas-area svg{width:100%;height:100%}
.zoom-controls{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:10}
.zoom-btn{width:32px;height:32px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.zoom-btn:hover{background:var(--bg4);border-color:var(--blue)}
.legend{position:absolute;bottom:12px;left:12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;z-index:10;font-size:11px}
.legend-row{display:flex;align-items:center;gap:8px;padding:2px 0}
.legend-line{width:24px;height:2px;border-radius:1px}

/* Security tab */
.security-container{flex:1;overflow-y:auto;padding:24px}
.severity-section{margin-bottom:28px}
.severity-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.severity-badge{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.severity-badge.critical{background:rgba(220,38,38,.15);color:var(--critical);border:1px solid rgba(220,38,38,.3)}
.severity-badge.high{background:rgba(234,88,12,.15);color:var(--high);border:1px solid rgba(234,88,12,.3)}
.severity-badge.medium{background:rgba(217,119,6,.15);color:var(--medium);border:1px solid rgba(217,119,6,.3)}
.severity-badge.low{background:rgba(37,99,235,.15);color:var(--low);border:1px solid rgba(37,99,235,.3)}
.severity-header h2{font-size:15px;font-weight:600}
.vuln-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}
.vuln-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;transition:all .2s;cursor:pointer;position:relative;overflow:hidden}
.vuln-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.vuln-card.critical::before{background:var(--critical)}
.vuln-card.high::before{background:var(--high)}
.vuln-card.medium::before{background:var(--medium)}
.vuln-card.low::before{background:var(--low)}
.vuln-card:hover{border-color:var(--blue);transform:translateY(-1px)}
.vuln-card h4{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.vuln-card h4 .num{font-size:11px;color:var(--text3);font-weight:400}
.vuln-card p{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.vuln-meta{display:flex;gap:8px;flex-wrap:wrap}
.vuln-tag{font-size:10px;padding:2px 8px;border-radius:3px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.vuln-fix{display:none;margin-top:12px;padding:12px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.vuln-fix.show{display:block}
.vuln-fix h5{font-size:12px;color:var(--green);margin-bottom:6px}
.vuln-fix p{font-size:12px;color:var(--text2);line-height:1.5}
.sec-stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 20px;min-width:140px}
.stat-card .num{font-size:28px;font-weight:700}
.stat-card .label{font-size:11px;color:var(--text3);margin-top:2px}
.stat-card.critical .num{color:var(--critical)}
.stat-card.high .num{color:var(--high)}
.stat-card.medium .num{color:var(--medium)}
.stat-card.low .num{color:var(--low)}
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-chip{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .15s}
.filter-chip:hover{border-color:var(--blue)}
.filter-chip.active{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}

/* Flow tab */
.flow-container{flex:1;display:flex;flex-direction:column;overflow:hidden}
.flow-tabs{display:flex;gap:2px;padding:12px 16px 0;background:var(--bg2);border-bottom:1px solid var(--border)}
.flow-tab{padding:8px 16px;background:var(--bg3);border:1px solid transparent;border-radius:6px 6px 0 0;cursor:pointer;color:var(--text2);font-size:12px;transition:all .2s}
.flow-tab:hover{background:var(--bg4);color:var(--text)}
.flow-tab.active{background:var(--bg);border-color:var(--border);border-bottom-color:var(--bg);color:var(--cyan);font-weight:600}
.flow-canvas{flex:1;overflow:auto;position:relative}
.flow-canvas svg{min-width:100%;min-height:100%}

/* Prompt area */
.prompt-area{background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px;max-height:160px;overflow-y:auto}
.prompt-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.prompt-bar span{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.copy-btn{padding:4px 14px;background:var(--blue);color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;transition:all .15s}
.copy-btn:hover{opacity:.85}
.prompt-text{font-family:'SF Mono',Consolas,monospace;font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-wrap}

/* Comments sidebar */
.comment-list{padding:8px 14px}
.comment-item{background:var(--bg3);border-radius:6px;padding:8px 10px;margin-bottom:6px;position:relative}
.comment-item .target{font-size:11px;color:var(--blue);font-weight:600}
.comment-item .text{font-size:12px;color:var(--text2);margin-top:3px}
.comment-item .del{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px}
.comment-item .del:hover{color:var(--red)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;width:400px;max-width:90vw}
.modal h3{font-size:15px;margin-bottom:4px}
.modal .subtitle{font-size:12px;color:var(--text3);margin-bottom:12px}
.modal textarea{width:100%;height:80px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px;font-family:inherit;font-size:13px;resize:vertical}
.modal textarea:focus{outline:none;border-color:var(--blue)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.modal-actions button{padding:6px 16px;border-radius:5px;border:1px solid var(--border);cursor:pointer;font-size:13px}
.modal-actions .cancel{background:var(--bg3);color:var(--text2)}
.modal-actions .save{background:var(--blue);color:#fff;border-color:var(--blue)}

/* Tooltip */
.tooltip{position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--text);pointer-events:none;z-index:50;max-width:260px;box-shadow:0 4px 12px rgba(0,0,0,.4);display:none}
.tooltip.show{display:block}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

.hidden{display:none !important}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>軍事兵棋推演 AI 系統 <span>v6.0 Architecture Explorer</span></h1>
    <div class="tabs">
      <div class="tab active" data-tab="arch">架構圖 Architecture</div>
      <div class="tab" data-tab="sec">安全漏洞 Security</div>
      <div class="tab" data-tab="flow">流程圖 Flows</div>
    </div>
  </div>
  <div class="main">
    <!-- ===== ARCHITECTURE TAB ===== -->
    <div id="tab-arch" class="tab-content" style="display:flex;flex:1;overflow:hidden">
      <div class="sidebar" id="arch-sidebar">
        <h3>Presets</h3>
        <div class="control-group" id="presets"></div>
        <h3>Layers</h3>
        <div class="control-group" id="layers"></div>
        <h3>Connections</h3>
        <div class="control-group" id="conn-filters"></div>
        <h3>Comments (<span id="comment-count">0</span>)</h3>
        <div class="comment-list" id="comment-list"></div>
      </div>
      <div class="canvas-area" id="arch-canvas">
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="zoomIn()">+</button>
          <button class="zoom-btn" onclick="zoomOut()">&minus;</button>
          <button class="zoom-btn" onclick="zoomReset()" style="font-size:11px">1:1</button>
        </div>
        <svg id="arch-svg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="legend" id="arch-legend"></div>
      </div>
    </div>

    <!-- ===== SECURITY TAB ===== -->
    <div id="tab-sec" class="tab-content hidden" style="display:flex;flex:1;overflow:hidden">
      <div class="security-container" id="sec-container"></div>
    </div>

    <!-- ===== FLOW TAB ===== -->
    <div id="tab-flow" class="tab-content hidden" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="flow-tabs" id="flow-tabs"></div>
      <div class="flow-canvas" id="flow-canvas">
        <svg id="flow-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>
  </div>

  <!-- Prompt area -->
  <div class="prompt-area">
    <div class="prompt-bar">
      <span>Generated Prompt</span>
      <button class="copy-btn" onclick="copyPrompt()">Copy</button>
    </div>
    <div class="prompt-text" id="prompt-output"></div>
  </div>
</div>

<!-- Comment Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="subtitle" id="modal-subtitle"></div>
    <textarea id="modal-input" placeholder="Add your comment about this component..."></textarea>
    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="save" onclick="saveComment()">Save Comment</button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>

// ============================================================

    updateAll();
  });
});

function renderArch() {
  const svg = document.getElementById('arch-svg');
  const W = 1020, H = 720;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  let html = `<defs>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="${connMeta['data-flow'].color}"/></marker>
    <marker id="ah-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="${connMeta['api-call'].color}"/></marker>
    <marker id="ah-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="${connMeta['file-io'].color}"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`;

  // Layer background bands
  const bands = [
    { y:10, h:200, label:'Frontend Layer (JavaScript ES6)', layer:'frontend', color:'rgba(59,130,246,.06)' },
    { y:220, h:280, label:'Backend Layer (Flask Python)', layer:'backend', color:'rgba(16,185,129,.06)' },
    { y:520, h:80, label:'External Services', layer:'external', color:'rgba(245,158,11,.06)' },
    { y:615, h:80, label:'Data Storage (JSON Files)', layer:'storage', color:'rgba(168,85,247,.06)' },
  ];
  bands.forEach(b => {
    if (!state.layers[b.layer]) return;
    html += `<rect x="5" y="${b.y}" width="${W-10}" height="${b.h}" rx="8" fill="${b.color}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>`;
    html += `<text x="16" y="${b.y+18}" font-size="11" fill="rgba(255,255,255,.2)" font-weight="600">${b.label}</text>`;
  });

  // Draw connections
  const markerMap = { 'data-flow':'ah-blue', 'api-call':'ah-green', 'file-io':'ah-purple' };
  archConns.forEach(c => {
    if (!state.connTypes[c.type]) return;
    const from = archNodes.find(n => n.id === c.from);
    const to = archNodes.find(n => n.id === c.to);
    if (!from || !to) return;
    if (!state.layers[from.layer] || !state.layers[to.layer]) return;
    const meta = connMeta[c.type];
    const x1 = from.x + from.w/2, y1 = from.y + from.h;
    const x2 = to.x + to.w/2, y2 = to.y;
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    const dy = Math.abs(y2-y1);
    const cy1 = y1 + dy*0.4, cy2 = y2 - dy*0.4;
    const dashAttr = meta.dash ? ` stroke-dasharray="${meta.dash}"` : '';
    html += `<path d="M${x1},${y1} C${x1},${cy1} ${x2},${cy2} ${x2},${y2}" fill="none" stroke="${meta.color}" stroke-width="1.5" opacity="0.5" marker-end="url(#${markerMap[c.type]})"${dashAttr}/>`;
  });

  // Draw nodes
  archNodes.forEach(n => {
    if (!state.layers[n.layer]) return;
    const lm = layerMeta[n.layer];
    const hasComment = state.comments.some(c => c.target === n.id);
    const borderColor = hasComment ? '#f59e0b' : lm.border;
    const bw = hasComment ? 2.5 : 1.5;
    html += `<g class="arch-node" data-id="${n.id}" style="cursor:pointer">
      <rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="6" fill="${n.color}" stroke="${borderColor}" stroke-width="${bw}" opacity="0.9"/>
      <text x="${n.x+n.w/2}" y="${n.y+16}" text-anchor="middle" font-size="11" fill="${lm.color}" font-weight="600">${n.label}</text>
      <text x="${n.x+n.w/2}" y="${n.y+30}" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.4)">${n.subtitle}</text>
      ${hasComment ? `<circle cx="${n.x+n.w-6}" cy="${n.y+6}" r="5" fill="#f59e0b"/><text x="${n.x+n.w-6}" y="${n.y+9.5}" text-anchor="middle" font-size="8" fill="#000" font-weight="700">${state.comments.filter(c=>c.target===n.id).length}</text>` : ''}
    </g>`;
  });

  svg.innerHTML = html;

  // Attach click events
  svg.querySelectorAll('.arch-node').forEach(g => {
    g.addEventListener('click', (e) => {
      const id = g.dataset.id;
      const node = archNodes.find(n => n.id === id);
      if (node) openModal(node);
    });
    g.addEventListener('mouseenter', (e) => {
      const rect = g.querySelector('rect');
      if (rect) rect.setAttribute('filter', 'url(#glow)');
    });
    g.addEventListener('mouseleave', (e) => {
      const rect = g.querySelector('rect');
      if (rect) rect.removeAttribute('filter');
    });
  });

  // Legend
  const legend = document.getElementById('arch-legend');
  let lhtml = '';
  Object.entries(connMeta).forEach(([k,v]) => {
    if (!state.connTypes[k]) return;
    const dashStyle = v.dash ? `background:repeating-linear-gradient(90deg,${v.color} 0,${v.color} 4px,transparent 4px,transparent 7px)` : `background:${v.color}`;
    lhtml += `<div class="legend-row"><div class="legend-line" style="${dashStyle};height:2px"></div>${v.label}</div>`;
  });
  legend.innerHTML = lhtml;
}

    <div class="filter-chip ${state.secFilter==='high'?'active':''}" data-filter="high">High</div>
    <div class="filter-chip ${state.secFilter==='medium'?'active':''}" data-filter="medium">Medium</div>
    <div class="filter-chip ${state.secFilter==='low'?'active':''}" data-filter="low">Low</div>
  </div>`;

  const groups = {};
  filtered.forEach(v => {
    if (!groups[v.sev]) groups[v.sev] = [];
    groups[v.sev].push(v);
  });

  const sevOrder = ['critical','high','medium','low'];
  const sevLabels = { critical:'Critical 嚴重', high:'High 高風險', medium:'Medium 中風險', low:'Low 低風險' };
  sevOrder.forEach(sev => {
    if (!groups[sev]) return;
    html += `<div class="severity-section">
      <div class="severity-header"><span class="severity-badge ${sev}">${sev.toUpperCase()}</span><h2>${sevLabels[sev]}</h2></div>
      <div class="vuln-grid">`;
    groups[sev].forEach(v => {
      html += `<div class="vuln-card ${v.sev}" data-vid="${v.id}">
        <h4><span class="num">#${v.id}</span> ${v.title}</h4>
        <p>${v.desc}</p>
        <div class="vuln-meta"><span class="vuln-tag">${v.component}</span><span class="vuln-tag" style="cursor:pointer;color:var(--green)">Show Fix</span></div>
        <div class="vuln-fix" id="fix-${v.id}"><h5>Recommended Fix 建議修復</h5><p>${v.fix}</p></div>
      </div>`;
    });
    html += `</div></div>`;
  });

  container.innerHTML = html;

  // Filter clicks
  container.querySelectorAll('.filter-chip').forEach(c => {
    c.addEventListener('click', () => {
      state.secFilter = c.dataset.filter;
      renderSecurity();
      updatePrompt();
    });
  });

  // Card click → toggle fix
  container.querySelectorAll('.vuln-card').forEach(card => {
    card.addEventListener('click', () => {
      const fixEl = card.querySelector('.vuln-fix');
      fixEl.classList.toggle('show');
    });
  });
}

// ============================================================
// RENDER: FLOWS
// ============================================================
function renderFlowTabs() {
  const tabsEl = document.getElementById('flow-tabs');
  tabsEl.innerHTML = flows.map((f, i) =>
    `<div class="flow-tab ${i===state.currentFlow?'active':''}" data-idx="${i}">${f.label}</div>`
  ).join('');
  tabsEl.querySelectorAll('.flow-tab').forEach(t => {
    t.addEventListener('click', () => {
      state.currentFlow = parseInt(t.dataset.idx);
      renderFlowTabs();
      renderFlow();
      updatePrompt();
    });
  });
}

function renderFlow() {
  const flow = flows[state.currentFlow];
  const svg = document.getElementById('flow-svg');
  const W = 1100, H = 420;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  let html = `<defs>
    <marker id="fah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#06b6d4"/></marker>
    <marker id="fah-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
    <filter id="fglow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`;

  // Title
  html += `<text x="${W/2}" y="30" text-anchor="middle" font-size="16" fill="var(--cyan)" font-weight="700">${flow.label}</text>`;

  // Draw edges
  flow.edges.forEach(e => {
    const from = flow.nodes.find(n => n.id === e.from);
    const to = flow.nodes.find(n => n.id === e.to);
    if (!from || !to) return;

    let x1, y1, x2, y2;
    const fCx = from.x + from.w/2, fCy = from.y + from.h/2;
    const tCx = to.x + to.w/2, tCy = to.y + to.h/2;

    // Determine exit/entry sides
    if (Math.abs(tCx - fCx) > Math.abs(tCy - fCy)) {
      if (tCx > fCx) { x1 = from.x+from.w; y1 = fCy; x2 = to.x; y2 = tCy; }
      else { x1 = from.x; y1 = fCy; x2 = to.x+to.w; y2 = tCy; }
    } else {
      if (tCy > fCy) { x1 = fCx; y1 = from.y+from.h; x2 = tCx; y2 = to.y; }
      else { x1 = fCx; y1 = from.y; x2 = tCx; y2 = to.y+to.h; }
    }

    const isNo = e.label === 'No';
    const color = isNo ? '#ef4444' : '#06b6d4';
    const marker = isNo ? 'fah-red' : 'fah';
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    const dx = x2-x1, dy = y2-y1;
    const cx1 = x1 + dx*0.4, cy1 = y1 + dy*0.1;
    const cx2 = x1 + dx*0.6, cy2 = y1 + dy*0.9;

    html += `<path d="M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="2" opacity="0.6" marker-end="url(#${marker})"/>`;
    if (e.label) {
      html += `<text x="${mx}" y="${my-6}" text-anchor="middle" font-size="10" fill="${color}" font-weight="600">${e.label}</text>`;
    }
  });

  // Draw nodes
  flow.nodes.forEach(n => {
    const lines = n.label.split('\n');
    if (n.type === 'diamond') {
      const cx = n.x + n.w/2, cy = n.y + n.h/2;
      html += `<polygon points="${cx},${n.y} ${n.x+n.w},${cy} ${cx},${n.y+n.h} ${n.x},${cy}" fill="${n.color}" stroke="#f59e0b" stroke-width="2" opacity="0.9"/>`;
      lines.forEach((line, i) => {
        html += `<text x="${cx}" y="${cy - 4 + i*14}" text-anchor="middle" font-size="10" fill="#f59e0b" font-weight="600">${line}</text>`;
      });
    } else {
      const rx = (n.type === 'start' || n.type === 'end') ? 20 : 8;
      const stroke = n.type === 'start' ? '#10b981' : n.type === 'end' ? '#ef4444' : '#06b6d4';
      html += `<rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="${rx}" fill="${n.color}" stroke="${stroke}" stroke-width="1.5" opacity="0.9"/>`;
      lines.forEach((line, i) => {
        const yOff = lines.length === 1 ? 4 : (i === 0 ? -3 : 12);
        html += `<text x="${n.x+n.w/2}" y="${n.y+n.h/2+yOff}" text-anchor="middle" font-size="10" fill="#e0e0e8" font-weight="${i===0?600:400}">${line}</text>`;
      });
    }
  });

  svg.innerHTML = html;
}

// ============================================================
// CONTROLS SETUP
// ============================================================
function setupControls() {
  // Presets
  const presetsEl = document.getElementById('presets');
  presetsEl.innerHTML = presets.map(p =>
    `<button class="preset-btn" data-preset="${p.id}">${p.label}</button>`
  ).join('');
  presetsEl.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = presets.find(x => x.id === btn.dataset.preset);
      state.layers = { ...p.layers };
      state.connTypes = { ...p.conns };
      presetsEl.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      syncCheckboxes();
      updateAll();
    });
  });

  // Layer checkboxes
  const layersEl = document.getElementById('layers');
  layersEl.innerHTML = Object.entries(layerMeta).map(([k,v]) =>
    `<label><input type="checkbox" data-layer="${k}" ${state.layers[k]?'checked':''}><span class="color-dot" style="background:${v.color}"></span>${v.label}</label>`
  ).join('');
  layersEl.querySelectorAll('input').forEach(cb => {
    cb.addEventListener('change', () => {
      state.layers[cb.dataset.layer] = cb.checked;
      updateAll();
    });
  });

  // Connection checkboxes
  const connEl = document.getElementById('conn-filters');
  connEl.innerHTML = Object.entries(connMeta).map(([k,v]) =>
    `<label><input type="checkbox" data-conn="${k}" ${state.connTypes[k]?'checked':''}><span class="color-dot" style="background:${v.color}"></span>${v.label}</label>`
  ).join('');
  connEl.querySelectorAll('input').forEach(cb => {
    cb.addEventListener('change', () => {
      state.connTypes[cb.dataset.conn] = cb.checked;
      updateAll();
    });
  });
}

function syncCheckboxes() {
  document.querySelectorAll('[data-layer]').forEach(cb => {
    cb.checked = state.layers[cb.dataset.layer];
  });
  document.querySelectorAll('[data-conn]').forEach(cb => {
    cb.checked = state.connTypes[cb.dataset.conn];
  });
}

// ============================================================
// ZOOM
// ============================================================
function zoomIn() { state.zoom = Math.min(state.zoom * 1.2, 3); applyZoom(); }
function zoomOut() { state.zoom = Math.max(state.zoom / 1.2, 0.3); applyZoom(); }
function zoomReset() { state.zoom = 1; applyZoom(); }
function applyZoom() {
  const svg = document.getElementById('arch-svg');
  svg.style.transform = `scale(${state.zoom})`;
  svg.style.transformOrigin = 'top left';
}

// ============================================================
// COMMENTS
// ============================================================
function openModal(node) {
  state.commentTarget = node;
  document.getElementById('modal-title').textContent = node.label;
  document.getElementById('modal-subtitle').textContent = node.subtitle + ' (' + node.layer + ')';
  document.getElementById('modal-input').value = '';
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  state.commentTarget = null;
}

function saveComment() {
  const text = document.getElementById('modal-input').value.trim();
  if (!text || !state.commentTarget) return;
  state.comments.push({
    id: Date.now(),
    target: state.commentTarget.id,
    targetLabel: state.commentTarget.label,
    targetFile: state.commentTarget.subtitle,
    text
  });
  closeModal();
  updateAll();
}

function renderComments() {
  const list = document.getElementById('comment-list');
  document.getElementById('comment-count').textContent = state.comments.length;
  if (state.comments.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px 0">Click a node to add comments</div>';
    return;
  }
  list.innerHTML = state.comments.map(c =>
    `<div class="comment-item"><div class="target">${c.targetLabel}</div><div class="text">${c.text}</div><button class="del" data-cid="${c.id}">&times;</button></div>`
  ).join('');
  list.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.comments = state.comments.filter(c => c.id !== parseInt(btn.dataset.cid));
      updateAll();
    });
  });
}

// ============================================================
// PROMPT
// ============================================================
function updatePrompt() {
  const parts = [];
  if (state.currentTab === 'arch') {
    const visLayers = Object.entries(state.layers).filter(([k,v])=>v).map(([k])=>layerMeta[k].label);
    parts.push(`This is the Military War Game AI System v6.0 architecture, showing: ${visLayers.join(', ')}.`);
    const visConns = Object.entries(state.connTypes).filter(([k,v])=>v).map(([k])=>connMeta[k].label);
    if (visConns.length < 3) parts.push(`Connection types visible: ${visConns.join(', ')}.`);
    if (state.comments.length > 0) {
      parts.push('\nFeedback on specific components:\n');
      state.comments.forEach(c => {
        parts.push(`**${c.targetLabel}** (${c.targetFile}):\n${c.text}\n`);
      });
    }
  } else if (state.currentTab === 'sec') {
    const showing = state.secFilter === 'all' ? 'all severity levels' : state.secFilter + ' severity';
    parts.push(`Security analysis of Military War Game AI System v6.0, showing ${showing}.`);
    parts.push(`Found: 3 Critical, 5 High, 5 Medium, 3 Low vulnerabilities across 16 issues.`);
    parts.push(`\nKey priorities:\n1. Add authentication/authorization to all 22 API endpoints\n2. Restrict CORS origins\n3. Disable Flask debug mode in production\n4. Add HTTPS via reverse proxy\n5. Implement rate limiting`);
  } else if (state.currentTab === 'flow') {
    const f = flows[state.currentFlow];
    parts.push(`Viewing flow diagram: ${f.label}`);
    parts.push(`This flow has ${f.nodes.length} steps and ${f.edges.length} transitions.`);
  }
  document.getElementById('prompt-output').textContent = parts.join('\n');
}

function copyPrompt() {
  const text = document.getElementById('prompt-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// ============================================================
// UPDATE ALL
// ============================================================
function updateAll() {
  if (state.currentTab === 'arch') {
    renderArch();
    renderComments();
  } else if (state.currentTab === 'sec') {
    renderSecurity();
  } else if (state.currentTab === 'flow') {
    renderFlowTabs();
    renderFlow();
  }
  updatePrompt();
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ============================================================
// INIT
// ============================================================
setupControls();
renderFlowTabs();
updateAll();
</script>
</body>
</html>
